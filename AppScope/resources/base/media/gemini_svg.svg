<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 外层圆角底板 (带柔和的高级投影) -->
  <g filter="url(#drop-shadow)">
    <rect x="24" y="24" width="208" height="208" rx="48" fill="#FFFFFF"/>
  </g>
  
  <!-- 内部背景微弱的网格线 (增加课表质感) -->
  <line x1="104" y1="48" x2="104" y2="208" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round"/>
  <line x1="152" y1="48" x2="152" y2="208" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round"/>

  <!-- 左侧课程块 (星期一) - 莫兰迪蓝 -->
  <rect x="56" y="64" width="32" height="64" rx="12" fill="#818CF8"/>
  
  <!-- 中间课程块 (星期二) - 樱花粉 -->
  <rect x="104" y="96" width="32" height="96" rx="12" fill="#FB7185"/>
  
  <!-- 右侧课程块 (星期三) - 薄荷绿 -->
  <rect x="152" y="56" width="32" height="48" rx="12" fill="#34D399"/>
  <!-- 右侧第二个课程块 -->
  <rect x="152" y="120" width="32" height="64" rx="12" fill="#FBBF24"/>

  <!-- SVG 投影滤镜定义 -->
  <defs>
    <filter id="drop-shadow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#94A3B8" flood-opacity="0.15"/>
    </filter>
  </defs>
</svg>
